# ============================================================
# ONE TIME ONLY — Run this ONCE to seed the Playwright cache
# After this succeeds, use playwright2.yml for all test runs
# DELETE or DISABLE this file after first successful run
# ============================================================

name: Seed Playwright Cache (Run Once)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repo B
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Create dummy package-lock.json if not exists
        run: |
          if [ ! -f package-lock.json ]; then
            echo '{"name":"seed","lockfileVersion":3,"packages":{}}' > package-lock.json
          fi

      - name: Install Playwright package
        run: npm install @playwright/test@1.58.2 --save-dev

      - name: Check cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser + OS deps
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "Installing OS deps first..."
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libcairo2 libatspi2.0-0t64 xvfb
          echo "OS deps done. Now downloading Chromium..."
          npx playwright install chromium
          echo "Chromium installed successfully!"
          ls -la ~/.cache/ms-playwright/

      - name: Verify browser works
        run: |
          node -e "
            const { chromium } = require('@playwright/test');
            (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage();
              await page.goto('about:blank');
              console.log('Browser launched successfully!');
              await browser.close();
            })();
          "

      - name: Cache is now saved
        run: |
          echo "Cache seeded successfully!"
          echo "Now run playwright2.yml — it will use this cache"
          ls -la ~/.cache/ms-playwright/

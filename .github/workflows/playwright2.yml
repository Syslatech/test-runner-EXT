# ============================================================
# Playwright Tests — triggered from test-runner-EXT HTML portal
# ============================================================
# Repo B (public):  Syslatech/test-runner-EXT   ← hosts the HTML
# Repo A (private): Syslatech/LP-EXT-Web         ← THIS workflow lives here
#
# Triggered via repository_dispatch (event_type: playwright)
# from TestRunner.html, OR manually via workflow_dispatch.
#
# REQUIRED SECRETS in LP-EXT-Web:
#   CHECKOUT_PAT_EXT — PAT with Contents:Read on LP-EXT-Web
#   STG_URL, STG2_URL, ENCOMPASS_URL, ID, USER_ID, PASSWORD
#   API_URL, CLIENT_ID, CLIENT_SECRET, INSTANCE_ID
#   EMAIL_USER, EMAIL_PASS, EMAIL_TO
# ============================================================

name: Playwright Tests -EXT WEB PORTAL

permissions:
  contents: write
  pages: write
  id-token: write

on:
  repository_dispatch:
    types: [playwright]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch in LP-EXT-Web to test'
        required: false
        default: 'master'
        type: string
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options: [all, loan-pricer, quick-pricer, unassigned]
      retries:
        description: 'Retry failed tests (1 retry when on)'
        required: false
        default: 'on'
        type: choice
        options: ['on', 'off']
      grep:
        description: 'TC filter — single: TC01 | multiple: TC01|TC05 | keyword: smoke'
        required: false
        default: ''
      spec:
        description: 'Specific spec file path — overrides test_suite if set'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Resolve inputs + detect Playwright version ────────────────────
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      pw_version:   ${{ steps.get-version.outputs.pw_version }}
      docker_image: ${{ steps.get-version.outputs.docker_image }}
      branch:       ${{ steps.resolve.outputs.branch }}
      test_suite:   ${{ steps.resolve.outputs.test_suite }}
      retries:      ${{ steps.resolve.outputs.retries }}
      grep:         ${{ steps.resolve.outputs.grep }}
      spec:         ${{ steps.resolve.outputs.spec }}

    steps:
      # Resolve inputs from either repository_dispatch or workflow_dispatch
      - name: Resolve inputs
        id: resolve
        run: |
          BRANCH="${{ github.event.client_payload.branch || github.event.inputs.branch }}"
          BRANCH="${BRANCH:-master}"
          TEST_SUITE="${{ github.event.client_payload.test_suite || github.event.inputs.test_suite }}"
          TEST_SUITE="${TEST_SUITE:-all}"
          RETRIES="${{ github.event.client_payload.retries || github.event.inputs.retries }}"
          RETRIES="${RETRIES:-on}"
          GREP="${{ github.event.client_payload.grep || github.event.inputs.grep }}"
          SPEC="${{ github.event.client_payload.spec || github.event.inputs.spec }}"

          echo "branch=$BRANCH"       >> "$GITHUB_OUTPUT"
          echo "test_suite=$TEST_SUITE" >> "$GITHUB_OUTPUT"
          echo "retries=$RETRIES"     >> "$GITHUB_OUTPUT"
          echo "grep=$GREP"           >> "$GITHUB_OUTPUT"
          echo "spec=$SPEC"           >> "$GITHUB_OUTPUT"

          echo "Resolved → branch=$BRANCH suite=$TEST_SUITE retries=$RETRIES"

      - name: Checkout LP-EXT-Web to read package-lock.json
        uses: actions/checkout@v4
        with:
          repository: Syslatech/LP-EXT-Web
          ref: ${{ steps.resolve.outputs.branch }}
          token: ${{ secrets.CHECKOUT_PAT_EXT }}

      - name: Detect Playwright version
        id: get-version
        run: |
          PW_VERSION=$(node -e "
            const lock = require('./package-lock.json');
            const pkg = lock.packages?.['node_modules/@playwright/test']
                     || lock.packages?.['node_modules/playwright'];
            console.log(pkg?.version || '');
          ")

          if [ -z "$PW_VERSION" ]; then
            PW_VERSION=$(node -e "
              const p = require('./package.json');
              const v = p.dependencies?.['@playwright/test']
                     || p.devDependencies?.['@playwright/test'] || '';
              console.log(v.replace(/[\^~>=<]/g,'').trim());
            ")
          fi

          echo "Detected Playwright version: $PW_VERSION"
          echo "pw_version=$PW_VERSION" >> "$GITHUB_OUTPUT"
          echo "docker_image=mcr.microsoft.com/playwright:v${PW_VERSION}-noble" >> "$GITHUB_OUTPUT"
  #
  # ── Job 2: Run tests ──────────────────────────────────────────────────────
  test:
    needs: detect-version
    name: 'Tests — ${{ needs.detect-version.outputs.branch }}'
    timeout-minutes: 120
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.detect-version.outputs.docker_image }}
      options: --user root

    steps:
      - name: Checkout LP-EXT-Web
        uses: actions/checkout@v4
        with:
          repository: Syslatech/LP-EXT-Web
          ref: ${{ needs.detect-version.outputs.branch }}
          token: ${{ secrets.CHECKOUT_PAT_EXT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show versions
        shell: bash
        run: |
          echo "Docker image : ${{ needs.detect-version.outputs.docker_image }}"
          echo "PW version   : ${{ needs.detect-version.outputs.pw_version }}"
          echo "Branch       : ${{ needs.detect-version.outputs.branch }}"
          echo "Suite        : ${{ needs.detect-version.outputs.test_suite }}"
          echo "Trigger      : ${{ github.event_name }}"
          npx playwright --version

      - name: Prepare run metadata
        id: meta
        shell: bash
        run: |
          BRANCH="${{ needs.detect-version.outputs.branch }}"
          SUITE="${{ needs.detect-version.outputs.test_suite }}"
          RETRIES="${{ needs.detect-version.outputs.retries }}"
          SAFE_BRANCH=$(echo "$BRANCH" | tr '/\\:*?"<>|' '-')
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "## Test Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`$BRANCH\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | \`$SUITE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Retries | \`$RETRIES\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PW Version | \`${{ needs.detect-version.outputs.pw_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | \`${{ github.run_number }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Run Playwright tests
        shell: bash
        env:
          USE_CI_ENV:    'true'
          HOME:          /root
          STG_URL:       ${{ secrets.STG_URL }}
          STG2_URL:      ${{ secrets.STG2_URL }}
          ENCOMPASS_URL: ${{ secrets.ENCOMPASS_URL }}
          ID:            ${{ secrets.ID }}
          USER_ID:       ${{ secrets.USER_ID }}
          PASSWORD:      ${{ secrets.PASSWORD }}
          API_URL:       ${{ secrets.API_URL }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          INSTANCE_ID:   ${{ secrets.INSTANCE_ID }}
          EMAIL_USER:    ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:    ${{ secrets.EMAIL_PASS }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: |
          SUITE="${{ needs.detect-version.outputs.test_suite }}"
          GREP="${{ needs.detect-version.outputs.grep }}"
          SPEC="${{ needs.detect-version.outputs.spec }}"
          RETRIES="${{ needs.detect-version.outputs.retries }}"
          SPEC="${SPEC//\\//}"

          if [[ "$RETRIES" == "on" ]]; then
            RETRY_FLAG="--retries=1"
          else
            RETRY_FLAG="--retries=0"
          fi

          declare -a CMD
          if [[ -n "$SPEC" ]]; then
            CMD=(npx playwright test "$SPEC" "$RETRY_FLAG")
          else
            case "$SUITE" in
              "loan-pricer")
                CMD=(npx playwright test --project='Loan pricer'
                  "tests/ext-web/LoanPricer"
                  "tests/ext-web/unassigned/Inprogress_Done_Testcases"
                  "$RETRY_FLAG")
                ;;
              "quick-pricer")
                CMD=(npx playwright test --project='Quick Pricer'
                  "tests/ext-web/QuickPricer/quick-pricer-module"
                  "tests/ext-web/QuickPricer/quick-pricerinternal"
                  "$RETRY_FLAG")
                ;;
              "unassigned")
                CMD=(npx playwright test --project='Loan pricer'
                  "tests/ext-web/unassigned"
                  "$RETRY_FLAG")
                ;;
              *)
                CMD=(npx playwright test "$RETRY_FLAG")
                ;;
            esac
          fi

          if [[ -n "$GREP" ]]; then
            CMD+=(--grep "$GREP")
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Generate report ZIP
        if: always()
        continue-on-error: true
        shell: bash
        run: node reports/generate-report.js

      - name: Upload test artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ steps.meta.outputs.safe_branch }}-${{ needs.detect-version.outputs.test_suite }}-run${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
            logs/
            reports/html-reports-zip/
          retention-days: 1

      - name: Stage Pages deployment
        if: always()
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          RUN="${{ github.run_number }}"
          BRANCH="${{ needs.detect-version.outputs.branch }}"
          SUITE="${{ needs.detect-version.outputs.test_suite }}"
          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          PW_VER="${{ needs.detect-version.outputs.pw_version }}"
          PAGES_DIR="pages-deploy"
          mkdir -p "$PAGES_DIR/report"
          if [ -d "playwright-report" ]; then
            cp -r playwright-report/. "$PAGES_DIR/report/"
          else
            echo "<html><body><h2>No report generated.</h2></body></html>" > "$PAGES_DIR/report/TestRunner.html"
          fi
          ZIP_FILE=$(ls reports/html-reports-zip/*.zip 2>/dev/null | sort | tail -1)
          if [ -n "$ZIP_FILE" ]; then
            cp "$ZIP_FILE" "$PAGES_DIR/report.zip"
          fi
          cat > "$PAGES_DIR/TestRunner.html" << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>Test Report — Run #${RUN}</title>
            <style>
              *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
              body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
              .card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);max-width:520px;width:100%;padding:2.5rem 2rem}
              .badge{display:inline-block;background:#e8f0fe;color:#1a73e8;font-size:.75rem;font-weight:600;padding:.25rem .75rem;border-radius:999px;margin-bottom:1rem;text-transform:uppercase}
              h1{font-size:1.5rem;color:#1a202c;margin-bottom:.5rem}
              .meta{font-size:.85rem;color:#718096;margin-bottom:2rem;line-height:1.6}
              .meta span{font-weight:600;color:#4a5568}
              .actions{display:flex;flex-direction:column;gap:.875rem}
              .btn{display:flex;align-items:center;gap:.75rem;padding:.875rem 1.25rem;border-radius:8px;text-decoration:none;font-size:.95rem;font-weight:600;transition:transform .1s,box-shadow .1s}
              .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
              .btn-primary{background:#1a73e8;color:#fff}
              .btn-secondary{background:#f7fafc;color:#2d3748;border:1.5px solid #e2e8f0}
              .footer{margin-top:2rem;font-size:.78rem;color:#a0aec0;text-align:center}
            </style>
          </head>
          <body>
            <div class="card">
              <div class="badge">Playwright Tests</div>
              <h1>Test Report &mdash; Run #${RUN}</h1>
              <div class="meta">
                <div>Branch: <span>${BRANCH}</span></div>
                <div>Suite: <span>${SUITE}</span></div>
                <div>Date: <span>${DATE}</span></div>
                <div>Playwright: <span>v${PW_VER}</span></div>
              </div>
              <div class="actions">
                <a class="btn btn-primary" href="./report/" target="_blank">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  View Test Report
                </a>
                <a class="btn btn-secondary" href="./report.zip" download>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Download ZIP
                </a>
                <a class="btn btn-secondary" href="https://${OWNER}.github.io/${REPO_NAME}/reports.html">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                  All Reports
                </a>
              </div>
              <div class="footer">Syslatech &bull; Ext Web Portal &bull; GitHub Actions</div>
            </div>
          </body>
          </html>
          HTMLEOF
          sed -i 's/^          //' "$PAGES_DIR/TestRunner.html"

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-deploy
          destination_dir: reports/${{ github.run_number }}
          keep_files: true

      - name: Post report link to Job Summary
        if: always()
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          RUN="${{ github.run_number }}"
          PAGES_URL="https://${OWNER}.github.io/test-runner-EXT/reports/${RUN}/"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Option | Link |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Landing page | [Open]($PAGES_URL) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| View report | [Open Report](${PAGES_URL}report/) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Download ZIP | [Download](${PAGES_URL}report.zip) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| All reports | [Dashboard](https://${OWNER}.github.io/test-runner-EXT/reports.html) |" >> "$GITHUB_STEP_SUMMARY"

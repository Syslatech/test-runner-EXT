<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Report — Run #7</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      max-width: 520px;
      width: 100%;
      padding: 2.5rem 2rem;
    }
    .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .04em;
      padding: .25rem .75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: .5rem; }
    .meta { font-size: .85rem; color: #718096; margin-bottom: 2rem; line-height: 1.6; }
    .meta span { font-weight: 600; color: #4a5568; }
    .actions { display: flex; flex-direction: column; gap: .875rem; }
    .btn {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .875rem 1.25rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: .95rem;
      font-weight: 600;
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #f7fafc; color: #2d3748; border: 1.5px solid #e2e8f0; }
    .btn svg { flex-shrink: 0; }
    .footer { margin-top: 2rem; font-size: .78rem; color: #a0aec0; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Playwright Tests</div>
    <h1>Test Report &mdash; Run #7</h1>
    <div class="meta">
      <div>Branch: <span>master</span></div>
      <div>Suite: <span>quick-pricer</span></div>
      <div>Date: <span>2026-06-04 15:05 UTC</span></div>
    </div>
    <div class="actions">
      <a class="btn btn-primary" href="./report/" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        View Test Report
      </a>
      <a class="btn btn-secondary" href="./report.zip" download>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download ZIP Report
      </a>
      <button class="btn btn-secondary" onclick="openModal()" style="border:none; cursor:pointer; width:100%;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        Run New Tests
      </button>
    </div>
    <div class="footer">Ext Web Portal &bull; GitHub Actions</div>
  </div>

  <div id="run-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:2rem; max-width:420px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.2);">
      <h2 style="font-size:1.1rem; font-weight:700; color:#1a202c; margin-bottom:1.25rem;">Run New Tests</h2>
      <div style="margin-bottom:.875rem;">
        <label style="display:block; font-size:.78rem; font-weight:600; color:#4a5568; margin-bottom:.3rem;">GitHub PAT <span style="font-weight:400; color:#a0aec0;">(workflow scope)</span></label>
        <input id="gh-token" type="password" placeholder="ghp_..." style="width:100%; padding:.6rem .75rem; border:1.5px solid #e2e8f0; border-radius:6px; font-size:.875rem; box-sizing:border-box;" />
      </div>
      <div style="margin-bottom:.875rem;">
        <label style="display:block; font-size:.78rem; font-weight:600; color:#4a5568; margin-bottom:.3rem;">Branch</label>
        <input id="run-branch" type="text" value="master" style="width:100%; padding:.6rem .75rem; border:1.5px solid #e2e8f0; border-radius:6px; font-size:.875rem; box-sizing:border-box;" />
      </div>
      <div style="margin-bottom:.875rem;">
        <label style="display:block; font-size:.78rem; font-weight:600; color:#4a5568; margin-bottom:.3rem;">Test Suite</label>
        <select id="run-suite" style="width:100%; padding:.6rem .75rem; border:1.5px solid #e2e8f0; border-radius:6px; font-size:.875rem; box-sizing:border-box;">
<option value="all">all</option>
<option value="loan-pricer">loan-pricer</option>
<option value="quick-pricer">quick-pricer</option>
<option value="unassigned">unassigned</option>
        </select>
      </div>
      <div style="margin-bottom:.875rem;">
        <label style="display:block; font-size:.78rem; font-weight:600; color:#4a5568; margin-bottom:.3rem;">Retries</label>
        <select id="run-retries" style="width:100%; padding:.6rem .75rem; border:1.5px solid #e2e8f0; border-radius:6px; font-size:.875rem; box-sizing:border-box;">
<option value="on">on</option>
<option value="off">off</option>
        </select>
      </div>
      <div style="margin-bottom:.875rem;">
        <label style="display:block; font-size:.78rem; font-weight:600; color:#4a5568; margin-bottom:.3rem;">Grep <span style="font-weight:400; color:#a0aec0;">(optional)</span></label>
        <input id="run-grep" type="text" placeholder="TC01 or smoke" style="width:100%; padding:.6rem .75rem; border:1.5px solid #e2e8f0; border-radius:6px; font-size:.875rem; box-sizing:border-box;" />
      </div>
      <div style="margin-bottom:1.25rem;">
        <label style="display:block; font-size:.78rem; font-weight:600; color:#4a5568; margin-bottom:.3rem;">Spec <span style="font-weight:400; color:#a0aec0;">(optional, overrides suite)</span></label>
        <input id="run-spec" type="text" placeholder="tests/ext-web/..." style="width:100%; padding:.6rem .75rem; border:1.5px solid #e2e8f0; border-radius:6px; font-size:.875rem; box-sizing:border-box;" />
      </div>
      <div id="run-status" style="display:none; padding:.7rem .875rem; border-radius:6px; font-size:.83rem; margin-bottom:1rem;"></div>
      <div style="display:flex; gap:.75rem;">
        <button id="trigger-btn" onclick="triggerWorkflow()" style="flex:1; padding:.75rem; background:#1a73e8; color:#fff; border:none; border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer;">Trigger</button>
        <button onclick="closeModal()" style="padding:.75rem 1.25rem; background:#f7fafc; color:#2d3748; border:1.5px solid #e2e8f0; border-radius:8px; font-size:.9rem; font-weight:600; cursor:pointer;">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    var GH_OWNER = 'Syslatech';
    var GH_REPO  = 'test-runner-EXT';
    var GH_WFLOW = 'playwright2.yml';

    function openModal() {
      var saved = localStorage.getItem('gh_pat');
      if (saved) document.getElementById('gh-token').value = saved;
      document.getElementById('run-modal').style.display = 'flex';
      document.getElementById('run-status').style.display = 'none';
    }
    function closeModal() {
      document.getElementById('run-modal').style.display = 'none';
    }
    document.getElementById('run-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    function setStatus(type, msg) {
      var el = document.getElementById('run-status');
      el.style.display = 'block';
      var colors = {
        success: { bg:'#f0fff4', color:'#276749', border:'#9ae6b4' },
        error:   { bg:'#fff5f5', color:'#c53030', border:'#feb2b2' },
        info:    { bg:'#ebf8ff', color:'#2b6cb0', border:'#90cdf4' }
      };
      var c = colors[type] || colors.info;
      el.style.background = c.bg;
      el.style.color = c.color;
      el.style.border = '1px solid ' + c.border;
      el.textContent = msg;
    }

    async function triggerWorkflow() {
      var token  = document.getElementById('gh-token').value.trim();
      var branch = document.getElementById('run-branch').value.trim() || 'master';
      var suite  = document.getElementById('run-suite').value;
      var retries= document.getElementById('run-retries').value;
      var grep   = document.getElementById('run-grep').value.trim();
      var spec   = document.getElementById('run-spec').value.trim();
      var btn    = document.getElementById('trigger-btn');

      if (!token) { setStatus('error', 'GitHub PAT is required.'); return; }

      localStorage.setItem('gh_pat', token);
      btn.disabled = true;
      btn.textContent = 'Triggering...';
      setStatus('info', 'Sending request to GitHub API...');

      try {
        var url = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/actions/workflows/' + GH_WFLOW + '/dispatches';
        var res = await fetch(url, {
method: 'POST',
headers: {
  'Authorization': 'Bearer ' + token,
  'Accept': 'application/vnd.github+json',
  'X-GitHub-Api-Version': '2022-11-28',
  'Content-Type': 'application/json'
},
body: JSON.stringify({ ref: 'master', inputs: { branch: branch, test_suite: suite, retries: retries, grep: grep, spec: spec } })
        });
        if (res.status === 204) {
setStatus('success', 'Workflow triggered successfully! It will appear in GitHub Actions shortly.');
        } else {
var err = await res.json().catch(function() { return {}; });
setStatus('error', 'Failed (' + res.status + '): ' + (err.message || 'Unknown error'));
        }
      } catch(e) {
        setStatus('error', 'Request failed: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Trigger';
    }
  </script>
</body>
</html>
